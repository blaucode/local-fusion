# local-fusion provider configuration
# API keys: config/providers.env (gitignored)

providers:
  featherless:
    enabled: true
    plan:
      name: premium                     # free | premium | scale
      billing: flat_rate                # no session/weekly caps
      features: [deepseek, kimi, glm, unlimited_size]
    base_url: https://api.featherless.ai/v1
    env_key: FEATHERLESS_API_KEY
    capacity:
      model: units                      # concurrency measured in units
      total: 4                          # concurrent connections on this plan
      context_window: 32768

  ollama:
    enabled: true
    plan:
      name: pro                         # free | pro | max
      billing: session+weekly           # resets every 5h / 7 days
      features: [cloud_models, private_models]
    base_url: https://ollama.com/v1
    env_key: OLLAMA_API_KEY
    capacity:
      model: slots                      # concurrency measured in model slots
      total: 3                          # concurrent models on pro plan

# Model registry
# scores: benchmark averages per role (populated by `local-fusion eval`)
# evaluated_on: task IDs used to generate the score
models:
