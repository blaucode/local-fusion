# Pipeline definitions
# Role queries: resolved at runtime by selecting models matching role + provider + min_score
# Hardcoded lists are still supported for explicit control (e.g. judges: [deepseek-v4-pro, qwq-32b])
pipelines:
  default:
    tl_panel:
      role: tl
      providers: [ollama]
      n: 3
      strategy: diverse                 # pick models with different training lineages
      min_score: 8.0                    # skip unscored or low-scoring models
      parallel: true
    synthesizer:
      models: [deepseek-v4-pro]
      parallel: false
    coder:
      models: [gpt-oss-120b-fl]
      parallel: false
    coder_fusion:                         # two coders compete, evaluator picks base, lead grafts best-of-both
      coder_a: gpt-oss-120b-fl            # Featherless — validated coder (9.5)
      coder_b: devstral-2                 # Ollama — different lineage → real diversity; runs parallel to A
      evaluator: gpt-oss-120b-ol          # Ollama — frees Featherless units for the lead
      lead: deepseek-v4-pro               # Featherless — synthesizer role, merges base + grafts
    reviewer_panel:
      role: tl
      providers: [ollama]
      n: 3
      min_score: 8.0
      parallel: true
    judges:
      models: [deepseek-v4-pro, gemma4-31b]
      parallel: true                    # deepseek=Featherless, gemma=Ollama → different pools, run concurrently

  haft_only:                            # fallback when fusion slots unavailable
    tl_panel:
      models: [gpt-oss-120b-ol]
      parallel: false
    coder:
      models: [gpt-oss-120b-fl]
      parallel: false
    judges:
      models: [deepseek-v4-pro, gemma4-31b]
      parallel: true

# Eval config — tasks used for benchmarking new models
eval:
  benchmark_tasks: [T25, T22]           # strongest discriminators in experiment series
  default_task: T25
  default_arm: haft-fusion              # known-good implementation to judge against
  judge_ground_truth:                   # expected score range for sanity check
    min: 8.0
    max: 10.0
  # Discrimination + calibration benchmark: a real judge must score KNOWN-GOOD
  # code high AND KNOWN-BAD code low. Ground-truth numbers are dual-judge averages
  # from the experiment series (T25 haft-fusion PASS, T22 solo FAIL).
  judge_benchmark:
    good: { task: T25, arm: haft-fusion, expected: 9.84 }
    bad:  { task: T22, arm: solo,        expected: 6.0 }
    samples: 3               # judge each arm this many times
    min_separation: 3.0      # good_mean - bad_mean must be >= this
    max_calibration_error: 1.5   # |mean - expected| must be <= this for BOTH arms
    max_stdev: 1.0           # warn if a judge's per-arm spread exceeds this
  # Coder eval: run candidate coder on a real task, score its output with the judge
  # panel, compare against the incumbent coder. PASS = viable; comparison label = better?
  coder_benchmark:
    task: T21                 # spec comes from run.py TASKS[task]["spec"]
    baseline: gpt-oss-120b-ol # incumbent coder to compare against
    min_score: 8.0            # candidate PASS bar (judge-panel mean)
  # Lead eval: two coders produce solutions, evaluator picks base+grafts, candidate lead
  # merges. Also stresses big-context handling (Featherless caps at 32K).
  lead_benchmark:
    task: T21
    baseline: deepseek-v4-pro # current lead/synthesizer to compare against
    min_score: 8.0
    coder_a: gpt-oss-120b-ol  # generates solution A to merge
    coder_b: devstral-2       # generates solution B to merge
